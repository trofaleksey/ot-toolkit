name: Bug report
description: Report a reproducible problem using synthetic data.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not attach real child/patient content or unsanitized logs. Use SECURITY.md for sensitive reports.
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Use synthetic board names and assets.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: App build, device, OS, orientation, accessibility settings
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — safety, privacy, data loss, trapped flow, or incorrect timer
        - High — repeated failure or accessibility barrier
        - Normal — limited friction or polish
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Explain what was sanitized. Do not include board labels, images, clinical narratives, or credentials.
  - type: checkboxes
    id: privacy
    attributes:
      label: Data-safety confirmation
      options:
        - label: This report contains only synthetic or fully deidentified information.
          required: true
