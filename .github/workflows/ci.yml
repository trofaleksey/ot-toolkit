name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Verify required project files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            .githooks/pre-push
            .swift-format
            AGENTS.md
            CONTRIBUTING.md
            Documentation/ADRs/0001-delivery-scope-and-platform.md
            Documentation/ADRs/0002-timer-lifecycle.md
            Documentation/ADRs/0003-local-data-and-media.md
            Documentation/ARCHITECTURE.md
            Documentation/CONTENT_GOVERNANCE.md
            Documentation/DESIGN_SYSTEM.md
            Documentation/PRIVACY.md
            Documentation/PRODUCT.md
            Documentation/ROADMAP.md
            Documentation/VALIDATION_PLAN.md
            OTToolkit.xcodeproj/project.pbxproj
            OTToolkit.xcodeproj/xcshareddata/xcschemes/OTToolkit.xcscheme
            OTToolkit.xctestplan
            OTToolkit/Resources/PrivacyInfo.xcprivacy
            README.md
            Scripts/format.sh
            Scripts/lint.sh
            SECURITY.md
          )
          for path in "${required[@]}"; do
            test -s "${path}"
          done
          test -x Scripts/format.sh
          test -x Scripts/lint.sh

      - name: Verify local main-push guard
        shell: bash
        run: |
          set -euo pipefail
          hook=.githooks/pre-push
          test -x "${hook}"
          sh -n "${hook}"

          zero=0000000000000000000000000000000000000000
          update=1111111111111111111111111111111111111111

          allow_case() {
            local description=$1
            shift
            if ! printf '%s\n' "$@" \
              | "${hook}" origin https://github.com/example/example.git; then
              echo "::error::The pre-push hook rejected ${description}."
              exit 1
            fi
          }

          reject_case() {
            local description=$1
            shift
            if printf '%s\n' "$@" \
              | "${hook}" origin https://github.com/example/example.git \
                >/dev/null 2>&1; then
              echo "::error::The pre-push hook allowed ${description}."
              exit 1
            fi
          }

          allow_case "safe non-main refs" \
            "refs/heads/codex/test ${update} refs/heads/codex/test ${zero}" \
            "refs/tags/main ${update} refs/tags/main ${zero}" \
            "(delete) ${zero} refs/heads/codex/old ${update}" \
            "refs/heads/main ${update} refs/heads/codex/from-main ${zero}"

          reject_case "a direct main update" \
            "refs/heads/codex/test ${update} refs/heads/main ${zero}"
          reject_case "main deletion" \
            "(delete) ${zero} refs/heads/main ${update}"
          reject_case "a multi-ref push containing main" \
            "refs/heads/codex/test ${update} refs/heads/codex/test ${zero}" \
            "refs/heads/other ${update} refs/heads/main ${zero}"

      - name: Reject trailing whitespace
        shell: bash
        run: |
          set -euo pipefail
          if git grep -nI -E '[[:blank:]]+$' -- \
            '*.md' '*.pbxproj' '*.plist' '*.sh' '*.swift' \
            '*.xcprivacy' '*.xcscheme' '*.xcstrings' '*.xctestplan' '*.yml' '*.yaml'; then
            echo "::error::Trailing whitespace found."
            exit 1
          fi

  build-and-test:
    needs: repository-policy
    runs-on: macos-15
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      DERIVED_DATA_PATH: ${{ runner.temp }}/OTToolkitDerivedData
      NSUnbufferedIO: "YES"

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Verify pinned toolchain and destinations
        shell: bash
        run: |
          set -euo pipefail
          test "$(xcodebuild -version | sed -n '1p')" = "Xcode 16.4"
          test "$(xcrun --sdk iphonesimulator --show-sdk-version)" = "18.5"
          xcrun simctl list devices available | grep -F "iPhone 16 ("
          xcrun simctl list devices available | grep -F "iPad (10th generation) ("

      - name: Lint Swift source
        run: ./Scripts/lint.sh

      - name: Verify project and privacy settings
        shell: bash
        run: |
          set -euo pipefail
          plutil -lint OTToolkit/Resources/PrivacyInfo.xcprivacy
          test "$(/usr/libexec/PlistBuddy -c 'Print :NSPrivacyTracking' \
            OTToolkit/Resources/PrivacyInfo.xcprivacy)" = "false"

          settings=$(xcodebuild \
            -project OTToolkit.xcodeproj \
            -scheme OTToolkit \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -showBuildSettings)
          grep -F "IPHONEOS_DEPLOYMENT_TARGET = 18.0" <<<"${settings}"
          grep -F "SWIFT_VERSION = 6.0" <<<"${settings}"
          grep -F "TARGETED_DEVICE_FAMILY = 1,2" <<<"${settings}"

          if find OTToolkit -type f -name '*.entitlements' -print -quit | grep -q .; then
            echo "::error::OTK-001 must not add an entitlements file."
            exit 1
          fi

          if git grep -nE \
            'SystemCapabilities|XCRemoteSwiftPackageReference|XCSwiftPackageProductDependency|CODE_SIGN_ENTITLEMENTS|com\.apple\.developer\.|NS[A-Za-z]+UsageDescription' \
            -- OTToolkit.xcodeproj OTToolkit; then
            echo "::error::A prohibited bootstrap capability or permission was found."
            exit 1
          fi

      - name: Prepare result bundles
        run: mkdir -p TestResults

      - name: Build Debug
        run: |
          xcodebuild build \
            -project OTToolkit.xcodeproj \
            -scheme OTToolkit \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -resultBundlePath TestResults/DebugBuild.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify bundled privacy manifest
        shell: bash
        run: |
          set -euo pipefail
          manifest="${DERIVED_DATA_PATH}/Build/Products/Debug-iphonesimulator/OTToolkit.app/PrivacyInfo.xcprivacy"
          test -f "${manifest}"
          plutil -lint "${manifest}"

      - name: Build Release
        run: |
          xcodebuild build \
            -project OTToolkit.xcodeproj \
            -scheme OTToolkit \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -resultBundlePath TestResults/ReleaseBuild.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Test iPhone
        run: |
          xcodebuild test \
            -project OTToolkit.xcodeproj \
            -scheme OTToolkit \
            -testPlan OTToolkit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -resultBundlePath TestResults/iPhone.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Test iPad critical flow
        run: |
          xcodebuild test \
            -project OTToolkit.xcodeproj \
            -scheme OTToolkit \
            -testPlan OTToolkit \
            -only-testing:OTToolkitUITests \
            -destination 'platform=iOS Simulator,name=iPad (10th generation),OS=18.5' \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -resultBundlePath TestResults/iPad.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload failure result bundles
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xcode-result-bundles-${{ github.run_attempt }}
          path: TestResults/*.xcresult
          if-no-files-found: ignore
          retention-days: 7
